name: MarketPulse AI

on:
  # Fallback scheduler: GitHub's own cron is best-effort and can run 1-3
  # hours late, and has no DST awareness (times below are UTC, tuned for
  # BST/summer; expect ~1hr drift once GMT/winter starts unless updated).
  # This exists because the originally-planned precise external scheduler
  # (cron-job.org) was never actually set up. Revisit README's "Production
  # schedule" section if/when that gets finished — it would replace this.
  schedule:
    - cron: "0 6 * * *"   # ~07:00 Europe/London (premarket)
    - cron: "30 13 * * *" # ~14:30 Europe/London (US market open)
    - cron: "0 20 * * *"  # ~21:00 Europe/London (US market close)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MarketPulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist state.json
        if: always()
        continue-on-error: true
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update state [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest and retrying..."
            git pull --rebase
          done
          echo "Could not push state.json after retries — a concurrent run likely already persisted it. Continuing without failing the job."
