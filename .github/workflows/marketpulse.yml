name: MarketPulse AI

on:
  # Scheduling is handled by an external cron service (cron-job.org) that
  # calls this workflow_dispatch trigger directly — it supports the
  # Europe/London timezone natively (auto-handles BST/GMT) and fires with
  # much tighter precision than GitHub's own `schedule:` trigger, which has
  # no timing guarantee. See README for the cron-job.org setup.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MarketPulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist state.json
        if: always()
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
