name: MarketPulse AI

on:
  # Runs on GitHub's own scheduler -- no external cron-job.org account or GitHub personal
  # access token required (the previous setup relied on both; the token had to be manually
  # renewed on expiry or every scheduled run would silently stop firing).
  #
  # GitHub Actions cron always runs in UTC, with no timezone awareness -- unlike the previous
  # cron-job.org setup, these times do NOT auto-adjust for BST/GMT. Below is currently
  # 14:00/18:00/21:00 Europe/London during British Summer Time (UTC+1). When BST ends (usually
  # the last Sunday of October) and clocks go back to GMT (UTC+0), London wall-clock time for
  # these runs will drift an hour earlier (13:00/17:00/20:00) until manually shifted back by
  # +1 hour here; the same adjustment happens in reverse when BST resumes in late March.
  schedule:
    - cron: "0 13 * * *"    # 14:00 Europe/London (BST) daily
    - cron: "0 17 * * *"    # 18:00 Europe/London (BST) daily
    - cron: "0 20 * * 1-5"  # 21:00 Europe/London (BST) weekdays only
  # Kept for manually triggering a run on demand (e.g. testing, or re-running after a failure)
  # without needing to wait for the next scheduled time.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MarketPulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist state.json
        if: always()
        continue-on-error: true
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update state [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest and retrying..."
            git pull --rebase
          done
          echo "Could not push state.json after retries — a concurrent run likely already persisted it. Continuing without failing the job."
