name: MarketPulse AI

on:
  schedule:
    # UTC times — set for UK summer time (BST, UTC+1). During UK winter
    # (GMT, UTC+0) these will fire an hour earlier in local time.
    - cron: "0 6 * * *"   # 07:00 BST / 06:00 GMT
    - cron: "0 12 * * *"  # 13:00 BST / 12:00 GMT
    - cron: "0 18 * * *"  # 19:00 BST / 18:00 GMT
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MarketPulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist state.json
        if: always()
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update state [skip ci]"
          git push
