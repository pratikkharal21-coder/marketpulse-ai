name: MarketPulse AI

on:
  # Triggered externally by cron-job.org (job IDs 7968113 / 7968114 / 7968124)
  # which POSTs to the GitHub Actions dispatch endpoint at the exact minute,
  # with Europe/London timezone awareness (auto-handles BST/GMT).
  # Schedule: 14:00 daily, 18:00 daily, 21:00 Mon-Fri only.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MarketPulse
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: python main.py

      - name: Persist state.json
        if: always()
        continue-on-error: true
        run: |
          git config user.name "marketpulse-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          if git diff --cached --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "Update state [skip ci]"
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt), rebasing onto latest and retrying..."
            git pull --rebase
          done
          echo "Could not push state.json after retries — a concurrent run likely already persisted it. Continuing without failing the job."
